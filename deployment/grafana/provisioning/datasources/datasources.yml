apiVersion: 1

datasources:
  - name: Polaris Prometheus
    uid: polaris-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Polaris Jaeger
    uid: polaris-jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
