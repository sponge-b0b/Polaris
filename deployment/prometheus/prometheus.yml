global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: polaris-runtime
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9464
        labels:
          service: polaris-runtime
          environment: development
